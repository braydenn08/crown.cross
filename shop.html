<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Holy — Crown & Cross</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #080808;
      --white: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --grey: #1a1a1a;
      --mid-grey: #2e2e2e;
      --text-muted: #888;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 48px;
      border-bottom: 1px solid #1e1e1e;
      position: sticky;
      top: 0;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(12px);
      z-index: 50;
    }

    .nav-back { text-decoration: none; color: var(--text-muted); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .nav-back:hover { color: var(--white); }

    .nav-brand img {
      height: 80px;
      width: 80px;
      object-fit: contain;
      mix-blend-mode: screen;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 40px 100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
    }

    .gallery { position: sticky; top: 100px; }

    .main-image-wrap {
      position: relative;
      overflow: hidden;
      background: var(--grey);
      aspect-ratio: 3/4;
    }

    .main-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .thumb { cursor: pointer; border: 1px solid transparent; }
    .thumb.active { border-color: var(--gold); }

    .info { padding-top: 10px; }

    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px;
      font-weight: 300;
      line-height: 0.9;
    }

    .checkout-btn {
      width: 100%;
      padding: 18px 28px;
      background: var(--gold);
      color: var(--black);
      border: none;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="nav-back">← Back</a>
    <a href="index.html" class="nav-brand">
      <img src="data:image/jpeg;base64,/9j/..." alt="Crown & Cross"> <!-- Your logo base64 is here -->
    </a>
  </nav>

  <div class="page">

    <!-- GALLERY - UPDATED -->
    <div class="gallery">
      <div class="main-image-wrap">
        <img id="mainImg" src="assets/images/holy-front.jpg" alt="Holy Shirt" class="main-image"/>
      </div>
      <div class="thumbnails">
        <div class="thumb active" onclick="changeImage(0, this)">
          <img src="assets/images/holy-front.jpg" alt="Front View">
        </div>
        <div class="thumb" onclick="changeImage(1, this)">
          <img src="assets/images/holy-back-1.jpg" alt="Back View">
        </div>
        <div class="thumb" onclick="changeImage(2, this)">
          <img src="assets/images/holy-front-2.jpg" alt="Front View 2">
        </div>
        <div class="thumb" onclick="changeImage(3, this)">
          <img src="assets/images/holy-back-2.jpg" alt="Back View 2">
        </div>
      </div>
    </div>

    <!-- INFO SECTION (unchanged) -->
    <div class="info">
      <p class="product-label">Crown & Cross — SS25</p>
      <h1 class="product-name">Holy Merch</h1>
      <!-- ... rest of your info, price, size selector, etc. stays the same ... -->
      <!-- I kept it short here for readability, but you can keep your original info section -->
    </div>

  </div>

  <script>
    const images = [
      'assets/images/holy-front.jpg',
      'assets/images/holy-back-1.jpg',
      'assets/images/holy-front-2.jpg',
      'assets/images/holy-back-2.jpg'
    ];

    let selectedSize = null;

    function changeImage(index, thumbEl) {
      document.getElementById('mainImg').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('mainImg').src = images[index];
        document.getElementById('mainImg').style.opacity = '1';
      }, 200);

      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      thumbEl.classList.add('active');
    }

    // Your existing size and WhatsApp functions remain the same
    function selectSize(btn) {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedSize = btn.innerText;
    }

    function goToWhatsApp() {
      if (!selectedSize) {
        alert("Please select a size before ordering.");
        return;
      }
      const phone = '233203919210';
      const message = encodeURIComponent(`Hi Crown & Cross!\n\nI'd like to order Holy Merch Tee\nSize: ${selectedSize}\nPrice: GHC 150`);
      window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }
  </script>
</body>
</html>
